databases:
  - name: polymarket-arbitrage-db
    plan: basic-256mb
    databaseName: polymarket_arbitrage
    postgresMajorVersion: "18"

services:
  - type: web
    name: polymarket-arbitrage-api
    runtime: python
    rootDir: .
    buildCommand: pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: ""
      - key: DATABASE_ECHO
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: polymarket-arbitrage-db
          property: connectionString

  - type: web
    name: polymarket-arbitrage-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  - type: cron
    name: polymarket-arbitrage-worker
    runtime: python
    rootDir: .
    schedule: "*/10 * * * *"
    buildCommand: pip install -e .
    startCommand: ./scripts/run_worker_cycle.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_ECHO
        value: "false"
      - key: WORKER_MARKET_LIMIT
        value: "50"
      - key: WORKER_MARKET_SAMPLE_SIZE
        value: "25"
      - key: WORKER_POLL_ITERATIONS
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: polymarket-arbitrage-db
          property: connectionString
